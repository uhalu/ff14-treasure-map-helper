<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <title>FF14 宝の地図 照合</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#3b2a1a" />
    <script
      data-goatcounter="https://uhalu.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="app">
      <header>
        <h1 data-i18n="appTitle">FF14 宝の地図 照合</h1>
        <a id="desktop-header-link" href="./desktop.html" data-i18n="desktopModeShortLink">PC用モードへ</a>
      </header>

      <div id="viewfinder">
        <video id="video" playsinline muted autoplay></video>
        <canvas id="capture-canvas"></canvas>

        <div id="guide-frame" class="hidden"></div>
        <p id="guide-hint" class="hidden" data-i18n="guideHintInitial">地図をこの枠に合わせてください</p>

        <div id="camera-fallback" hidden>
          <p id="camera-fallback-reason"></p>
          <p><a href="./desktop.html" data-i18n="desktopModeLink">PC用モード（スクショ貼り付け）</a></p>
        </div>

        <div id="candidates-panel" hidden>
          <p data-i18n="candidatesTitle">候補（タップで採用）</p>
          <ul id="candidates-list"></ul>
        </div>

        <div id="result-panel" hidden>
          <div id="result-main">
            <div id="result-zone"></div>
            <div id="result-grade"></div>
            <div id="result-confidence"></div>
          </div>
          <div id="capture-review" hidden>
            <img id="capture-thumb" alt="認識した地図画像" data-i18n-alt="captureAlt" />
          </div>
          <button id="rescan-button" type="button" data-i18n="rescan">再スキャン</button>
        </div>

        <div id="loading-overlay">
          <div class="spinner"></div>
          <p id="status" data-i18n="dbLoading">DB を読み込み中…</p>
          <button id="retry-button" type="button" hidden data-i18n="retry">再試行</button>
        </div>
      </div>

      <div id="bottom-bar">
        <label id="require-ocr-label"><input type="checkbox" id="require-ocr" /><span data-i18n="requireOcr">OCR認識を必須にする</span></label>
        <span id="ocr-status"></span>
        <select id="lang-select" aria-label="Language">
          <option value="ja">日本語</option>
          <option value="en">English</option>
          <option value="de">Deutsch</option>
          <option value="fr">Français</option>
          <option value="ko">한국어</option>
          <option value="zh">简体中文</option>
        </select>
        <span id="build-id"></span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
